<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 100" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&amp;display=swap');
      .bg-dark { fill: #0d1727; } /* 匹配你网页的深色背景 */
      .icon-stroke { fill: none; stroke: #475569; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .icon-fill { fill: #ffffff; stroke: #475569; stroke-width: 4; stroke-linejoin: round; }
      .logo-text { font-family: 'Montserrat', sans-serif; font-size: 38px; font-weight: 800; fill: #60a5fa; letter-spacing: -0.5px; }
    </style>
  </defs>

  <rect class="bg-dark" width="100%" height="100%" rx="8"/>

  <path class="icon-stroke" d="M 36 42 v -8 a 14 14 0 0 1 28 0 v 8" />

  <rect class="icon-fill" x="28" y="42" width="44" height="30" rx="6" />

  <rect x="35" y="52" width="6" height="12" rx="3" fill="#95BF47" />
  <rect x="47" y="52" width="6" height="12" rx="3" fill="#FF9900" />
  <rect x="59" y="52" width="6" height="12" rx="3" fill="#0064D2" />

  <text class="logo-text" x="100" y="63">ShopBG Remover</text>
</svg>
